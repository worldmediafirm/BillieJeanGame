<!DOCTYPE html>
<html>
<head>
  <title>WMF OPS - Game Start</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div id="overlay">
    <div id="overlayContent">
      <div class="Game-Title"></div>
      <div id="spacer-i"></div>

      <input type="file" id="imageInput" accept="image/*" style="display: none;">

      <button class="uploadButton" type="button">
        <span class="main-text">Play as Yourself</span>
        <div><span class="subtext">Upload a picture</span></div>
      </button>

      <button id="playDefault" type="button">Play as DJ UMC</button>

      <div class="clientImgBorder" style="display: none;">
        <img id="User_Pic_Upload" alt="   " style="display:none;">
      </div>

      <div id="loadingIndicator" style="display: none;">
        <div class="loader"></div>
      </div>

    <div class="confirmPic-button-row">
      <button id="confirmButton" style="display:none;" type="button">Yeah That Works.</button>
      <button id="retryButton" style="display:none;" type="button">RETRY</button>
    </div>

    </div>
  </div>
<p class="landscape-hint">Works best in landscape mode.</p>
  <div class="menu-container" style="display:none;">
    <div class="Instructions"></div>
    <div class="Footer"></div>
    <button class="Start_Button" type="button">Start</button>
    <button class="Sound_Toggle_Button" type="button">Sound On/Off</button>
  </div>
  

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="sound-manager.js"></script>
  <script src="user-image-handler.js"></script>
  <script src="game-start-module.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

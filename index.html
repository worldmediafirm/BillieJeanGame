<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMF OPS - CAPTCHA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background-color: #5A9690;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(16px, 3vw, 32px);
      font-family: Arial, sans-serif;
    }

    .captcha-shell {
      width: min(92vw, 720px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 4vh, 40px);
    }

    .wmf-logo-container {
      width: min(78vw, 420px);
      aspect-ratio: 1 / 1;
      background-image: url('/graphic-assets/wmf-logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      flex-shrink: 0;
    }

    .slider-frame {
      width: min(92vw, 620px);
      height: clamp(52px, 8vw, 64px);
      border: 2px solid #ddd;
      background-color: #F3F2EC;
      border-radius: 999px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(8px, 2vw, 12px);
      color: #333;
      flex-shrink: 0;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }

    .slider-button {
      width: clamp(44px, 7vw, 60px);
      aspect-ratio: 1 / 1;
      background-color: #2F5755;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      transition: background-color 0.2s ease;
    }

    .slider-text {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 clamp(56px, 10vw, 90px);
      text-align: center;
      z-index: 1;
      pointer-events: none;
      color: #432323;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-size: clamp(12px, 2.2vw, 18px);
      line-height: 1.2;
    }

    @media (max-height: 700px) {
      .captcha-shell {
        gap: 16px;
      }

      .wmf-logo-container {
        width: min(52vw, 240px);
      }
    }

    @media (max-width: 420px) {
      .slider-text {
        padding: 0 56px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="captcha-shell">
    <div class="wmf-logo-container"></div>

    <div class="slider-frame">
      <span class="slider-text">Slide to confirm you're not a Bot</span>
      <div class="slider-button"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function () {
      let isDragging = false;

      const $frame = $('.slider-frame');
      const $button = $('.slider-button');

      function getMaxRight() {
        return $frame.width() - $button.outerWidth();
      }

      function setButtonLeft(rawLeft) {
        const clampedLeft = Math.min(Math.max(0, rawLeft), getMaxRight());
        $button.css('left', clampedLeft + 'px');
      }

      function verifyPosition() {
        const maxRight = getMaxRight();
        const currentLeft = $button.position().left;

        if (currentLeft >= maxRight - 2) {
          $button.css({
            backgroundColor: '#4CAF50',
            cursor: 'default'
          });

          window.location.href = 'main.html';
        } else {
          $button.animate({ left: '2px' }, 200);
        }
      }

      $button.on('mousedown touchstart', function (e) {
        isDragging = true;
        e.preventDefault();
      });

      $(document).on('mouseup touchend', function () {
        if (isDragging) {
          isDragging = false;
          verifyPosition();
        }
      });

      $(document).on('mousemove touchmove', function (e) {
        if (!isDragging) return;

        let pageX;
        if (e.type === 'touchmove') {
          pageX = e.originalEvent.touches[0].pageX;
        } else {
          pageX = e.pageX;
        }

        const moveX = pageX - $frame.offset().left - ($button.outerWidth() / 2);
        setButtonLeft(moveX);
      });

      $(window).on('resize', function () {
        const currentLeft = $button.position().left;
        setButtonLeft(currentLeft);
      });
    });
  </script>
</body>
</html>
